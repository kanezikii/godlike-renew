name: Add Godlike Server Time

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
    - cron: '15 2,14,21 * * *'
    - cron: '45 5,17,23 * * *'

jobs:
  add_time_job:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      # ========== 修复：完整解压并启动 Xray 代理 ==========
      - name: Deploy and Start Xray Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          echo "检测到代理配置，正在下载并安装 Xray-core..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          
          # 【核心修复】：去掉了后面的 xray 限制，解压压缩包内的所有文件（包含 .dat 路由文件）
          unzip -q xray.zip -d ./xray-bin
          chmod +x ./xray-bin/xray
          
          echo "写入配置文件..."
          # 使用更严谨的 EOF 方式写入，防止系统把 JSON 里的特殊字符吃掉
          cat << 'EOF' > ./xray-bin/config.json
          ${{ secrets.XRAY_CONFIG }}
          EOF
          
          echo "后台启动 Xray 代理（本地 socks5://127.0.0.1:10808）..."
          nohup ./xray-bin/xray run -c ./xray-bin/config.json > xray.log 2>&1 &
          
          echo "等待 3 秒确保代理连接成功..."
          sleep 3
          
          # 打印 Xray 的真实启动日志，方便万一失败时排错
          echo "=== Xray 启动日志 ==="
          cat xray.log
          echo "====================="
          
          # 在 Python 启动前，用更底层的 curl 测试代理通不通
          echo "正在用 Curl 测试代理连通性..."
          curl -s --socks5-hostname 127.0.0.1:10808 https://api.ipify.org?format=text || echo "⚠️ Curl 测试失败，代理未能打通"
          echo ""
      # ========================================================

      - name: Run Time Adder Script
        env:
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          # 更改此处的环境变量名，并写死端口为 Xray 配置中的 10808
          SOCKS5_PROXY: "socks5://127.0.0.1:10808"
        run: python -u main.py

      - name: Upload error artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: "*.png"

      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "🕐 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
