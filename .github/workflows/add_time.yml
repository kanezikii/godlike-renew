name: Add Godlike Server Time

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
    - cron: '15 2,14,21 * * *'
    - cron: '45 5,17,23 * * *'

jobs:
  add_time_job:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      # ========== 新增：安装 gost 并启动 SOCKS5 代理 ==========
      - name: Install and start gost SOCKS5 proxy
        if: ${{ env.SOCKS5_PROXY != '' }}
        env:
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: |
          echo "检测到 SOCKS5_PROXY，正在安装 gost..."
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost
          echo "gost 安装完成，启动本地代理转发..."
          # 将远程 SOCKS5 代理转发到本地 1080 端口
          # SOCKS5_PROXY 格式: socks5://user:pass@host:port 或 socks5://host:port
          gost -L=:1080 -F="${SOCKS5_PROXY}" &
          sleep 2
          echo "gost 代理已启动（本地 socks5://127.0.0.1:1080）"
      # ========================================================

      - name: Run Time Adder Script
        env:
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          # ===== 新增：传递代理配置给 Python 脚本 =====
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
          # ============================================
        run: python -u main.py

      - name: Upload error artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: "*.png"

      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "🕐 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
