name: Add Godlike Server Time (Multi-Account)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6,12,18 * * *' # 每天4次，确保时长充足

jobs:
  renew_job:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        account_id: [1, 2] # 账号矩阵排队执行

    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Deploy and Start Xray Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          echo "⬇️ 下载 Xray 核心..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d ./xray-bin
          chmod +x ./xray-bin/xray
          
          echo "📝 安全写入配置文件..."
          # 【核心修复】：使用原生的环境变量安全写入，防止 JSON 格式被 Bash 破坏
          echo "$XRAY_CONFIG" > ./xray-bin/config.json
          
          echo "🚀 后台启动代理..."
          nohup ./xray-bin/xray run -c ./xray-bin/config.json > xray.log 2>&1 &
          sleep 3
          
          echo "📄 打印代理启动日志："
          cat xray.log

      - name: Run Time Adder Script
        env:
          PTERODACTYL_EMAIL: ${{ secrets[format('PTERODACTYL_EMAIL_{0}', matrix.account_id)] }}
          PTERODACTYL_PASSWORD: ${{ secrets[format('PTERODACTYL_PASSWORD_{0}', matrix.account_id)] }}
          SERVER_URL: ${{ secrets[format('SERVER_URL_{0}', matrix.account_id)] }}
          SOCKS5_PROXY: "socks5://127.0.0.1:10808"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python -u main.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-account-${{ matrix.account_id }}
          path: "*.png"
          retention-days: 3

      - name: Commit time.txt to repo
        if: matrix.account_id == 1 # 仅第一个账号更新文件，防止并发冲突
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git commit -m "🕐 Multi-account session updated" || echo "No changes"
          git push origin HEAD:main || echo "Push failed"
