name: Add Godlike Server Time

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
    - cron: '15 2,14,21 * * *'
    - cron: '45 5,17,23 * * *'

jobs:
  add_time_job:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Deploy and Start Xray Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          echo "检测到代理配置，正在下载并安装 Xray-core..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          
          unzip -q xray.zip -d ./xray-bin
          chmod +x ./xray-bin/xray
          
          echo "写入配置文件..."
          cat << 'EOF' > ./xray-bin/config.json
          ${{ secrets.XRAY_CONFIG }}
          EOF
          
          echo "后台启动 Xray 代理 (本地 socks5://127.0.0.1:10808)..."
          nohup ./xray-bin/xray run -c ./xray-bin/config.json > xray.log 2>&1 &
          
          echo "等待 3 秒确保代理连接成功..."
          sleep 3

      - name: Run Time Adder Script
        env:
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          SOCKS5_PROXY: "socks5://127.0.0.1:10808"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python -u main.py

      # 【核心修改】：无论成功还是失败，都打包上传截图，方便你随时查看现场
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-screenshots
          path: "*.png"
          retention-days: 7

      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "🕐 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
